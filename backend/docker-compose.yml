services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aatn
      POSTGRES_PASSWORD: aatn
      POSTGRES_DB: aatn
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aatn" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-mq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - MIGRATIONS_DIR=/app/migrations
      - APP_ENV=dev
    volumes:
      - ./configs:/app/configs
      - ./migrations:/app/migrations
  user-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=user-service
      - CONFIG_PATH=/app/configs/config.yaml
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - JWT_SECRET=CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET
      - HTTP_PORT=8081
      - APP_ENV=dev
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=avatars
      - S3_USE_SSL=false
      - S3_PUBLIC_URL=http://localhost:9000/files
      - GATEWAY_URL=http://gateway:8080
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
    ports:
      - "8081:8081"
    volumes:
      - ./configs:/app/configs

  email-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.email-worker
    depends_on:
      backend-mq:
        condition: service_healthy
    environment:
      - SERVICE_NAME=email-worker
      - CONFIG_PATH=/app/configs/config.yaml
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - APP_ENV=dev
    volumes:
      - ./configs:/app/configs

  portfolio-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.portfolio-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=portfolio-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - HTTP_PORT=8082
      - APP_ENV=dev
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "8082:8082"
    volumes:
      - ./configs:/app/configs

  notification-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=notification-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - REDIS_ADDR=redis:6379
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - HTTP_PORT=8085
      - APP_ENV=dev
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      - INTERNAL_ALLOWED_IPS=${INTERNAL_ALLOWED_IPS:-}
    ports:
      - "8085:8085"
    volumes:
      - ./configs:/app/configs

  file-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.file-service
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=file-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - HTTP_PORT=8086
      - APP_ENV=dev
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=files
      - S3_USE_SSL=false
      - S3_PUBLIC_URL=http://localhost:9000/files
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      - INTERNAL_ALLOWED_IPS=${INTERNAL_ALLOWED_IPS:-}
    ports:
      - "8086:8086"
    volumes:
      - ./configs:/app/configs

  community-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.community-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=community-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - REDIS_ADDR=redis:6379
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - HTTP_PORT=8087
      - APP_ENV=dev
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
    ports:
      - "8087:8087"
    volumes:
      - ./configs:/app/configs

  opp-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.opp-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=opp-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - HTTP_PORT=8083
      - APP_ENV=dev
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "8083:8083"
    volumes:
      - ./configs:/app/configs

  events-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.events-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=events-service
      - CONFIG_PATH=/app/configs/config.yaml
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - HTTP_PORT=8084
      - APP_ENV=dev
      - GATEWAY_URL=http://gateway:8080
    ports:
      - "8084:8084"
    volumes:
      - ./configs:/app/configs

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      portfolio-service:
        condition: service_started
      notification-service:
        condition: service_started
      file-service:
        condition: service_started
      community-service:
        condition: service_started
      opp-service:
        condition: service_started
      events-service:
        condition: service_started
    # Gateway must be started before services that depend on it for internal calls
    environment:
      - SERVICE_NAME=gateway
      - CONFIG_PATH=/app/configs/config.yaml
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - JWT_SECRET=CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET
      - HTTP_PORT=8080
      - CORS_ORIGINS=*
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs

volumes:
  rabbitmq_data:
    driver: local
