services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aatn
      POSTGRES_PASSWORD: aatn
      POSTGRES_DB: aatn
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aatn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-mq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - JWT_SECRET=CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET
      - HTTP_PORT=8081
      - APP_ENV=dev
      - MIGRATIONS_DIR=/app/migrations
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=avatars
      - S3_USE_SSL=false
      - S3_PUBLIC_URL=http://localhost:9000/avatars
    ports:
      - "8081:8081"
    volumes:
      - ./configs:/app/configs
      - ./migrations:/app/migrations

  email-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.email-worker
    depends_on:
      backend-mq:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - APP_ENV=dev
    volumes:
      - ./configs:/app/configs

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
      user-service:
        condition: service_started
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - REDIS_ADDR=redis:6379
      - POSTGRES_DSN=postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable
      - JWT_SECRET=CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET
      - HTTP_PORT=8080
      - CORS_ORIGINS=*
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs
