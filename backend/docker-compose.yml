x-postgres-dsn: &postgres-dsn
  POSTGRES_DSN: postgres://aatn:aatn@postgres:5432/aatn?sslmode=disable

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aatn
      POSTGRES_PASSWORD: aatn
      POSTGRES_DB: aatn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aatn" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-mq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgres-dsn
      CONFIG_PATH: /app/configs/config.yaml
      MIGRATIONS_DIR: /app/migrations
      APP_ENV: dev
    volumes:
      - ./configs:/app/configs
      - ./migrations:/app/migrations

  # Core business monolith: user, portfolio, opportunity, notification
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *postgres-dsn
      SERVICE_NAME: backend
      CONFIG_PATH: /app/configs/config.yaml
      DISABLE_EMAIL_VERIFICATION: ${DISABLE_EMAIL_VERIFICATION:-true}
      REDIS_ADDR: redis:6379
      MQ_BROKER: amqp://guest:guest@backend-mq:5672/
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET}
      HTTP_PORT: "8081"
      APP_ENV: dev
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: avatars
      S3_USE_SSL: "false"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/files}
      GATEWAY_URL: http://gateway:8080
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    ports:
      - "8081:8081"
    volumes:
      - ./configs:/app/configs

  email-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.email-worker
    depends_on:
      backend-mq:
        condition: service_healthy
    environment:
      - SERVICE_NAME=email-worker
      - CONFIG_PATH=/app/configs/config.yaml
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - APP_ENV=dev
    volumes:
      - ./configs:/app/configs

  file-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.file-service
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *postgres-dsn
      SERVICE_NAME: file-service
      CONFIG_PATH: /app/configs/config.yaml
      HTTP_PORT: "8086"
      APP_ENV: dev
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: files
      S3_USE_SSL: "false"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/files}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      INTERNAL_ALLOWED_IPS: ${INTERNAL_ALLOWED_IPS:-}
    ports:
      - "8086:8086"
    volumes:
      - ./configs:/app/configs

  chat-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.chat-service
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *postgres-dsn
      SERVICE_NAME: chat-service
      CONFIG_PATH: /app/configs/config.yaml
      HTTP_PORT: "8088"
      APP_ENV: dev
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    ports:
      - "8088:8088"
    volumes:
      - ./configs:/app/configs

  ai-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.ai-worker
    depends_on:
      backend-mq:
        condition: service_healthy
    environment:
      - SERVICE_NAME=ai-worker
      - CONFIG_PATH=/app/configs/config.yaml
      - MQ_BROKER=amqp://guest:guest@backend-mq:5672/
      - APP_ENV=dev
    volumes:
      - ./configs:/app/configs

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-mq:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started
      file-service:
        condition: service_started
      chat-service:
        condition: service_started
    environment:
      <<: *postgres-dsn
      SERVICE_NAME: gateway
      CONFIG_PATH: /app/configs/config.yaml
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET}
      HTTP_PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      CHAT_SERVICE_URL: http://chat-service:8088
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
