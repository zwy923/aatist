app:
  name: "aatn-backend"
  env: "dev"
  http_port: 8080

postgres:
  dsn: "postgres://user:password@localhost:5432/aatn?sslmode=disable"

redis:
  addr: "localhost:6379"
  db: 0

mq:
  broker: "amqp://guest:guest@mq:5672/"
  publish_confirm_timeout: 5s

s3:
  endpoint: "localhost:9000"
  bucket: "aatn-assets"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  public_url: "http://localhost:9000"

jwt:
  secret: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET"
  # Access token (short-lived). Clamped 5–120. Env override: JWT_ACCESS_MINUTES
  ttl_minutes: 15
  # Refresh token (rotation on each refresh). Clamped 1–90 days. Env: JWT_REFRESH_DAYS
  refresh_days: 14

# INTERNAL_API_TOKEN: Set via env for production. When set, Gateway validates X-Internal-Token
# on /api/v1/internal/* routes. All services that call internal routes must send this token.
# Generate: openssl rand -hex 32

# Sign in with Google — prefer env: GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET, GOOGLE_OAUTH_REDIRECT_URI
google_oauth:
  client_id: ""
  client_secret: ""
  # Must match Google Console "Authorized redirect URIs", e.g. https://aatist.fi/auth/callback/google
  redirect_uri: ""

email:
  sendgrid_api_key: "SG.xxxxx"
  from_email: "no-reply@aatist.fi"
  frontend_url: "http://localhost:5173"
  # Set to true to temporarily disable email verification (no verification email sent, login allowed without verification)
  disable_email_verification: false
  # Auto-verified school email domains (only for student/alumni roles)
  # Students with these email domains will be automatically verified upon registration
  auto_verified_domains:
    - "@aalto.fi"
    # Add more school domains here in the future
    # - "@helsinki.fi"
    # - "@tuni.fi"
