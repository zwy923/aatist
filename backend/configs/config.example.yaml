app:
  name: "aatn-backend"
  env: "dev"
  http_port: 8080

postgres:
  dsn: "postgres://user:password@localhost:5432/aatn?sslmode=disable"

redis:
  addr: "localhost:6379"
  db: 0

mq:
  broker: "amqp://guest:guest@mq:5672/"
  publish_confirm_timeout: 5s

s3:
  endpoint: "localhost:9000"
  bucket: "aatn-assets"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  public_url: "http://localhost:9000"

jwt:
  secret: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET"
  ttl_minutes: 60
  # Access token TTL: 15 minutes (hardcoded in code)
  # Refresh token TTL: 30 days (hardcoded in code)

email:
  sendgrid_api_key: "SG.xxxxx"
  from_email: "no-reply@aatist.fi"
  frontend_url: "http://localhost:5173"
  # Auto-verified school email domains (only for student/alumni roles)
  # Students with these email domains will be automatically verified upon registration
  auto_verified_domains:
    - "@aalto.fi"
    # Add more school domains here in the future
    # - "@helsinki.fi"
    # - "@tuni.fi"
